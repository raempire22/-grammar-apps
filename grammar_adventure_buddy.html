<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Adventure Buddy ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap');

:root {
  --coral: #ff6b6b;
  --sun: #ffd93d;
  --mint: #6bcb77;
  --lavender: #b084f0;
  --peach: #ffa552;
  --pink: #ff8fab;
  --blue: #4cc9f0;
  --text: #2d2d44;
  --muted: #9090b0;
  --card-shadow: 0 6px 24px rgba(130,90,220,0.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Quicksand', sans-serif;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  background: #fef6ff;
  background-image:
    radial-gradient(ellipse at 5% 10%, rgba(255,215,61,0.18) 0%, transparent 40%),
    radial-gradient(ellipse at 95% 5%, rgba(76,201,240,0.15) 0%, transparent 35%),
    radial-gradient(ellipse at 85% 90%, rgba(176,132,240,0.15) 0%, transparent 40%),
    radial-gradient(ellipse at 10% 90%, rgba(107,203,119,0.13) 0%, transparent 35%);
}

.clouds { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.cloud { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50px; }
.cloud::before, .cloud::after { content: ''; position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; }
.c1 { width:100px; height:32px; top:8%; animation: cloudMove 22s linear infinite; left:-120px; }
.c1::before { width:50px; height:50px; top:-25px; left:15px; }
.c1::after { width:35px; height:35px; top:-18px; left:50px; }
.c2 { width:70px; height:22px; top:35%; animation: cloudMove 30s linear infinite 8s; left:-90px; }
.c2::before { width:34px; height:34px; top:-18px; left:10px; }
.c3 { width:90px; height:28px; top:70%; animation: cloudMove 26s linear infinite 15s; left:-110px; }
.c3::before { width:44px; height:44px; top:-22px; left:12px; }
.c3::after { width:30px; height:30px; top:-16px; left:46px; }
@keyframes cloudMove { from { transform: translateX(0); } to { transform: translateX(110vw); } }

.header {
  position: sticky; top: 0; z-index: 200;
  background: linear-gradient(135deg, #ff8fab 0%, #c77dff 55%, #4cc9f0 100%);
  padding: 10px 18px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 22px rgba(180,100,240,0.3);
}
.logo {
  font-family: 'Baloo 2', cursive;
  font-size: 1.25rem; font-weight: 800; color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  display: flex; align-items: center; gap: 7px;
}
.logo-buddy { animation: buddyWave 2s ease-in-out infinite; display: inline-block; }
@keyframes buddyWave { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }

.hstats { display: flex; gap: 7px; align-items: center; }
.hpill {
  background: rgba(255,255,255,0.28); backdrop-filter: blur(6px);
  border-radius: 20px; padding: 4px 11px;
  font-size: 0.77rem; font-weight: 700; color: white;
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
}

/* MUTE BUTTON */
.mute-btn {
  background: rgba(255,255,255,0.25);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 20px; padding: 4px 12px;
  color: white; font-size: 0.77rem; font-weight: 800;
  cursor: pointer; font-family: 'Quicksand', sans-serif;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.2s; white-space: nowrap;
}
.mute-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
.mute-btn.muted { background: rgba(255,100,100,0.35); border-color: rgba(255,150,150,0.5); }

.main {
  position: relative; z-index: 1;
  max-width: 820px; margin: 0 auto;
  padding: 22px 14px 120px;
}

/* NAME SCREEN */
.name-screen {
  text-align: center; padding: 36px 20px;
  animation: popBounce 0.7s cubic-bezier(.34,1.6,.64,1);
}
@keyframes popBounce { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.big-buddy { font-size: 5.5rem; line-height: 1; display: block; margin-bottom: 10px; animation: floatBuddy 3s ease-in-out infinite; }
@keyframes floatBuddy { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-10px) rotate(4deg); } }
.name-title {
  font-family: 'Baloo 2', cursive; font-size: 1.85rem; font-weight: 800;
  background: linear-gradient(90deg, var(--coral), var(--lavender), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
}
.name-sub { color: var(--muted); font-size: 0.95rem; font-weight: 600; margin-bottom: 22px; }
.name-row { display: flex; gap: 10px; max-width: 390px; margin: 0 auto 20px; }
.name-field {
  flex: 1; background: white; border: 3px solid #e0d0ff; border-radius: 22px;
  padding: 12px 18px; font-family: 'Quicksand', sans-serif;
  font-size: 1rem; font-weight: 700; color: var(--text);
  outline: none; box-shadow: var(--card-shadow); transition: border-color 0.2s;
}
.name-field:focus { border-color: var(--lavender); }
.go-btn {
  background: linear-gradient(135deg, var(--coral), var(--peach));
  border: none; border-radius: 22px; padding: 12px 22px; color: white;
  font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 800;
  cursor: pointer; box-shadow: 0 5px 18px rgba(255,107,107,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.go-btn:hover { transform: translateY(-3px) scale(1.06); box-shadow: 0 10px 25px rgba(255,107,107,0.5); }
.badge-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
.pre-badge {
  background: white; border-radius: 14px; padding: 7px 14px;
  font-size: 0.82rem; font-weight: 700; box-shadow: var(--card-shadow); color: var(--text);
  animation: staggerIn 0.5s ease both;
}
.pre-badge:nth-child(1){animation-delay:0.1s} .pre-badge:nth-child(2){animation-delay:0.2s}
.pre-badge:nth-child(3){animation-delay:0.3s} .pre-badge:nth-child(4){animation-delay:0.4s}
.pre-badge:nth-child(5){animation-delay:0.5s}
@keyframes staggerIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* CHAT */
.chat-wrap { display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; animation: msgSlide 0.4s cubic-bezier(.34,1.4,.64,1); }
.msg.user { flex-direction: row-reverse; }
@keyframes msgSlide { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.av {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.35rem; flex-shrink: 0; box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}
.av.buddy-av { background: linear-gradient(135deg, #ffb6c1, #c77dff); animation: avBounce 2.5s ease-in-out infinite; }
@keyframes avBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.av.kid-av { background: linear-gradient(135deg, var(--sun), var(--peach)); font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1.15rem; color: white; }

.bubble {
  max-width: 80%; border-radius: 22px;
  padding: 14px 18px; line-height: 1.7;
  font-size: 0.92rem; font-weight: 600;
}
.msg.buddy .bubble {
  background: white; border: 2px solid rgba(176,132,240,0.18);
  border-top-left-radius: 6px; box-shadow: var(--card-shadow);
}
.msg.user .bubble {
  background: linear-gradient(135deg, #4cc9f0, #6bcb77);
  color: white; border-top-right-radius: 6px;
  box-shadow: 0 4px 16px rgba(76,201,240,0.3);
}
.bubble h3 { font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 800; color: var(--lavender); margin-bottom: 7px; }
.bubble strong { color: var(--coral); }
.bubble em { color: #3aab60; font-style: normal; font-weight: 700; }
.bubble code { background: #fff0f8; border: 1.5px solid #ffd0ea; border-radius: 8px; padding: 1px 7px; font-family: monospace; color: var(--coral); font-size: 0.88em; }

/* MENU GRID */
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 13px; }
.mcard {
  background: white; border: 2.5px solid transparent;
  border-radius: 18px; padding: 11px 13px; cursor: pointer;
  font-family: 'Quicksand', sans-serif; font-size: 0.83rem; font-weight: 700; color: var(--text);
  text-align: left; display: flex; align-items: center; gap: 9px;
  box-shadow: 0 3px 14px rgba(0,0,0,0.07);
  transition: all 0.22s cubic-bezier(.34,1.4,.64,1);
}
.mcard:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 10px 28px rgba(0,0,0,0.12); }
.mcard:nth-child(1):hover { border-color: var(--coral); background: #fff5f5; }
.mcard:nth-child(2):hover { border-color: var(--lavender); background: #f8f0ff; }
.mcard:nth-child(3):hover { border-color: var(--mint); background: #f0fff4; }
.mcard:nth-child(4):hover { border-color: var(--sun); background: #fffbea; }
.mcard:nth-child(5):hover { border-color: var(--pink); background: #fff0f6; }
.mcard:nth-child(6):hover { border-color: var(--blue); background: #f0fbff; }
.mcard:nth-child(7):hover { border-color: var(--peach); background: #fff7f0; }
.mcard:nth-child(8):hover { border-color: var(--mint); background: #f0fff4; }
.mcard:nth-child(9):hover { border-color: var(--lavender); background: #f8f0ff; }
.ncirc {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.76rem; font-weight: 800; color: white; flex-shrink: 0;
}
.nc1{background:var(--coral);} .nc2{background:var(--lavender);}
.nc3{background:var(--mint);} .nc4{background:var(--sun);color:#5a3e00;}
.nc5{background:var(--pink);} .nc6{background:var(--blue);}
.nc7{background:var(--peach);} .nc8{background:var(--mint);}
.nc9{background:var(--lavender);}

/* PROGRESS */
.prog-box { background: linear-gradient(135deg, #f8f0ff, #fff8f0); border: 2px dashed #ddc0ff; border-radius: 18px; padding: 14px 18px; margin: 10px 0; }
.prog-label { font-size: 0.78rem; color: var(--muted); font-weight: 700; display: flex; justify-content: space-between; margin-bottom: 6px; }
.prog-track { height: 13px; background: #eedeff; border-radius: 10px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--coral), var(--lavender), var(--blue)); border-radius: 10px; transition: width 0.9s cubic-bezier(.34,1.3,.64,1); }

/* STAR POP */
.star-pop {
  display: inline-block;
  background: linear-gradient(135deg, var(--sun), var(--peach));
  border-radius: 20px; padding: 3px 11px;
  font-size: 0.78rem; font-weight: 800; color: #5a3e00;
  animation: starPop 0.5s cubic-bezier(.34,1.6,.64,1);
  margin: 2px 2px;
}
@keyframes starPop { 0% { transform: scale(0) rotate(-15deg); } 65% { transform: scale(1.25) rotate(4deg); } 100% { transform: scale(1) rotate(0); } }

/* TYPING */
.typing-dots { display: flex; gap: 5px; padding: 4px 0; }
.typing-dots span { width: 11px; height: 11px; border-radius: 50%; animation: boingDot 1.1s infinite; }
.typing-dots span:nth-child(1) { background: var(--coral); }
.typing-dots span:nth-child(2) { background: var(--lavender); animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { background: var(--blue); animation-delay: 0.4s; }
@keyframes boingDot { 0%,80%,100% { transform: scale(0.65); } 40% { transform: scale(1.35); } }

/* INPUT */
.input-area {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
  background: linear-gradient(0deg, #fef6ff 55%, transparent);
  padding: 14px;
}
.input-box {
  max-width: 820px; margin: 0 auto; background: white;
  border: 3px solid #ddc8ff; border-radius: 30px;
  display: flex; align-items: center; padding: 8px 8px 8px 20px;
  box-shadow: 0 4px 22px rgba(176,132,240,0.18);
  transition: border-color 0.2s;
}
.input-box:focus-within { border-color: var(--lavender); }
#userMsg {
  flex: 1; border: none; outline: none; background: none;
  font-family: 'Quicksand', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text);
}
#userMsg::placeholder { color: #c8b0e8; }
.send-btn {
  background: linear-gradient(135deg, var(--coral), var(--lavender));
  border: none; border-radius: 24px; width: 46px; height: 46px;
  cursor: pointer; font-size: 1.15rem; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: 0 4px 14px rgba(255,107,107,0.35); transition: transform 0.15s;
}
.send-btn:hover { transform: scale(1.13) rotate(5deg); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.divider { height: 2px; background: linear-gradient(90deg, transparent, #e8d0ff, transparent); margin: 10px 0; }

@media (max-width: 500px) {
  .menu-grid { grid-template-columns: 1fr; }
  .bubble { max-width: 88%; }
  .logo { font-size: 1rem; }
  .hpill { font-size: 0.7rem; padding: 3px 8px; }
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f5eeff; }
::-webkit-scrollbar-thumb { background: var(--lavender); border-radius: 3px; }
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>

<div class="header">
  <div class="logo">
    <span class="logo-buddy">🐼</span>
    Grammar Adventure Buddy
  </div>
  <div class="hstats">
    <div class="hpill">⭐ <span id="starsDisplay">0</span></div>
    <div class="hpill">🌟 <span id="levelDisplay">Little Explorer</span></div>
    <div class="hpill">☀️ <span id="streakDisplay">1</span>d</div>
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 Sound</button>
  </div>
</div>

<div class="main">
  <!-- NAME SCREEN -->
  <div id="nameScreen" class="name-screen">
    <span class="big-buddy">🐼</span>
    <div class="name-title">Hello, Hello! I'm your Grammar Adventure Buddy! 🌈</div>
    <div class="name-sub">
      Powered by the British Council Grammar Book ✨<br>
      Let's play, learn, and earn STARS together! 🌟
    </div>
    <div class="name-row">
      <input class="name-field" id="nameField" placeholder="What's your cute name? 😄" maxlength="20" />
      <button class="go-btn" onclick="startAdventure()">Let's Play! 🎉</button>
    </div>
    <div class="badge-row">
      <div class="pre-badge">📖 Story Lessons</div>
      <div class="pre-badge">⭐ Earn Stars</div>
      <div class="pre-badge">🎮 Fun Games</div>
      <div class="pre-badge">🏅 Win Badges</div>
      <div class="pre-badge">🦄 Level Up!</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen" style="display:none;">
    <div class="chat-wrap" id="chatWrap"></div>
  </div>
</div>

<div class="input-area" id="inputArea" style="display:none;">
  <div class="input-box">
    <input type="text" id="userMsg" placeholder="Pick a number 1–9 or type anything! 😊" maxlength="400" />
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">🚀</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 🎵 KID-FRIENDLY SOUND ENGINE (Web Audio API)
// All sounds are bubbly, magical, and gentle —
// perfect for ages 7–12!
// ═══════════════════════════════════════════════
let audioCtx = null;
let isMuted = false;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  btn.textContent = isMuted ? '🔇 Muted' : '🔊 Sound';
  btn.classList.toggle('muted', isMuted);
}

// ── Helper: single tone ──────────────────────────
function ding(freq, type, t0, dur, vol, ctx, dest) {
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g); g.connect(dest);
  osc.start(t0); osc.stop(t0 + dur + 0.02);
}

// ── 1. CORRECT ANSWER: xylophone ding-ding-ding ─
function playCorrect() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.38; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Happy xylophone melody — C E G high-C
  [523, 659, 784, 1047].forEach((f, i) => ding(f, 'sine', t + i * 0.13, 0.4, 0.55, ctx, master));
  // Sparkle overtones
  [2093, 2637].forEach((f, i) => ding(f, 'sine', t + 0.55 + i * 0.08, 0.18, 0.2, ctx, master));
}

// ── 2. WRONG ANSWER: cartoon boing ──────────────
function playWrong() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.32; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Descending wobbly spring sound
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(520, t);
  osc.frequency.exponentialRampToValueAtTime(180, t + 0.35);
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
  osc.connect(g); g.connect(master);
  osc.start(t); osc.stop(t + 0.4);
  // Second boing echo
  const osc2 = ctx.createOscillator();
  const g2   = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(400, t + 0.28);
  osc2.frequency.exponentialRampToValueAtTime(140, t + 0.55);
  g2.gain.setValueAtTime(0.3, t + 0.28);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.58);
  osc2.connect(g2); g2.connect(master);
  osc2.start(t + 0.28); osc2.stop(t + 0.6);
}

// ── 3. STAR EARNED: twinkly coin collect ────────
function playStar() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.32; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Bright ping-ping-ping
  [880, 1109, 1319].forEach((f, i) => ding(f, 'sine', t + i * 0.09, 0.22, 0.45, ctx, master));
  // Glitter shimmer
  [1760, 2217].forEach((f, i) => ding(f, 'sine', t + 0.28 + i * 0.06, 0.14, 0.25, ctx, master));
}

// ── 4. LEVEL UP: magical rainbow fanfare ────────
function playLevelUp() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.42; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Bubbly ascending scale (do-re-mi-fa-sol-la-ti-do!)
  [261, 294, 330, 349, 392, 440, 494, 523, 659, 784, 1047].forEach((f, i) =>
    ding(f, 'sine', t + i * 0.09, 0.25, 0.5, ctx, master)
  );
  // Big sparkle burst at the top
  [1319, 1568, 2093, 2637].forEach((f, i) =>
    ding(f, 'sine', t + 1.05 + i * 0.07, 0.3, 0.35, ctx, master)
  );
  // Warm bass hum underneath
  [130, 165, 196].forEach((f, i) =>
    ding(f, 'triangle', t + i * 0.18, 0.5, 0.28, ctx, master)
  );
}

// ── 5. BADGE UNLOCK: fairy magic chime ──────────
function playBadge() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.4; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Fairy arpeggio — light and magical
  [659, 784, 988, 1319, 1568, 2093].forEach((f, i) =>
    ding(f, 'sine', t + i * 0.1, 0.28, 0.42, ctx, master)
  );
  // Pixie dust flutter
  for (let i = 0; i < 5; i++) {
    const rf = 1200 + Math.random() * 900;
    ding(rf, 'sine', t + 0.62 + i * 0.07, 0.15, 0.2, ctx, master);
  }
}

// ── 6. WELCOME JINGLE: sunny adventure theme ────
function playWelcome() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.38; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Cheerful kids' melody (like a cartoon intro)
  const melody = [392, 523, 659, 523, 659, 784, 659, 784, 1047];
  melody.forEach((f, i) => ding(f, 'sine', t + i * 0.14, 0.22, 0.48, ctx, master));
  // Happy bass bounce
  [196, 261, 196, 261].forEach((f, i) => ding(f, 'triangle', t + i * 0.28, 0.35, 0.3, ctx, master));
  // Finale sparkle
  [1047, 1319, 1568, 2093].forEach((f, i) =>
    ding(f, 'sine', t + 1.3 + i * 0.08, 0.2, 0.28, ctx, master)
  );
}

// ── 7. SEND BUTTON: gentle bubble pop ───────────
function playSend() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.22; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Soft bubbly pop
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(700, t);
  osc.frequency.exponentialRampToValueAtTime(300, t + 0.08);
  g.gain.setValueAtTime(0.45, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc.connect(g); g.connect(master);
  osc.start(t); osc.stop(t + 0.12);
}

// ── 8. AI REPLY: gentle chime notification ──────
function playReceive() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.2; master.connect(ctx.destination);
  const t = ctx.currentTime;
  ding(523, 'sine', t, 0.12, 0.4, ctx, master);
  ding(659, 'sine', t + 0.1, 0.16, 0.4, ctx, master);
}

// ── 9. STREAK: sunshine shimmer ─────────────────
function playStreak() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.34; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Warm rising shimmer like sunshine rays
  [392, 494, 587, 740, 880, 1047, 1319].forEach((f, i) =>
    ding(f, 'sine', t + i * 0.07, 0.18, 0.38, ctx, master)
  );
}

// ── 10. QUIZ START: playful drum roll ───────────
function playQuizStart() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.3; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // Cartoon drum tap-tap-tap-BOOM
  [0.05, 0.1, 0.15, 0.18, 0.21, 0.24].forEach((offset, i) => {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * 0.7;
    const s = ctx.createBufferSource();
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.08 + i * 0.03, t + offset);
    g.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.06);
    s.buffer = buf; s.connect(g); g.connect(master);
    s.start(t + offset); s.stop(t + offset + 0.07);
  });
  // Happy ending chime after the roll
  [523, 659, 784].forEach((f, i) => ding(f, 'sine', t + 0.38 + i * 0.1, 0.25, 0.4, ctx, master));
}

// ── 11. REWARD SHOP: treasure chest open ────────
function playReward() {
  if (isMuted) return;
  const ctx = getCtx();
  const master = ctx.createGain(); master.gain.value = 0.38; master.connect(ctx.destination);
  const t = ctx.currentTime;
  // "Treasure found!" ascending glitter sequence
  [261, 330, 392, 523, 659, 784, 1047, 1319].forEach((f, i) =>
    ding(f, 'triangle', t + i * 0.08, 0.2, 0.45, ctx, master)
  );
  [1568, 2093, 2637].forEach((f, i) =>
    ding(f, 'sine', t + 0.68 + i * 0.07, 0.22, 0.3, ctx, master)
  );
}

// ══ SOUND TRIGGER: reads AI reply and fires sound ══
function triggerSounds(reply) {
  const lc = reply.toLowerCase();

  if (lc.includes('level') && (lc.includes('levelled up') || lc.includes('leveled up') || lc.includes('wow wow wow'))) {
    setTimeout(playLevelUp, 100); return;
  }
  if (lc.includes('badge') && (lc.includes('unlocked') || lc.includes('earned') || lc.includes('new badge'))) {
    setTimeout(playBadge, 100); return;
  }
  if (lc.includes('ding-ding') || lc.includes('super correct') || lc.includes('yayyy') || lc.includes('yay!') || lc.includes('correct!')) {
    setTimeout(playCorrect, 80);
    setTimeout(playStar, 480);
    return;
  }
  if (lc.includes('oopsie daisy') || lc.includes('boing boing') || lc.includes('almost!') || lc.includes('nice try')) {
    setTimeout(playWrong, 80);
    setTimeout(playStar, 450);
    return;
  }
  if (lc.includes('+10') || lc.includes('wooho') || lc.includes('finished') || lc.includes('completed')) {
    setTimeout(playStar, 100);
    return;
  }
  if (lc.includes('streak') || lc.includes('sunshine') || lc.includes('☀️')) {
    setTimeout(playStreak, 100); return;
  }
  if (lc.includes('reward') || lc.includes('treasure') || lc.includes('magic shop')) {
    setTimeout(playReward, 100); return;
  }
  // Default: soft chime for every buddy message
  setTimeout(playReceive, 80);
}

// ════════════════════════════════════════════════
const state = {
  name: '', stars: 0, streak: 1,
  level: 'Little Explorer', badges: [], history: []
};

const LEVELS = [
  { name: 'Little Explorer', emoji: '🌱', max: 30 },
  { name: 'Brave Buddy',     emoji: '🦊', max: 80 },
  { name: 'Super Star',      emoji: '⭐', max: 150 },
  { name: 'Grammar Wizard',  emoji: '🧙', max: Infinity },
];

function buildSystem() {
  return `You are Grammar Adventure Buddy — the happiest, most magical English grammar helper for Malaysian primary school kids aged 7–12 (Year 1 to Year 6)!

Your ONLY knowledge source is the British Council English Grammar Guide, which covers:
1. PRONOUNS — personal (I/you/he/she/it/we/they), object (me/him/her/us/them), dummy subjects (it/there), this/that/these/those, reflexive (myself/yourself/himself), reciprocal (each other), indefinite (everybody/something/nobody), relative (who/which/that), possessive
2. DETERMINERS — which/what as question words, the definite article "the", quantifiers (some/any/many/few), possessive adjectives (my/your/his/her/its/our/their)
3. POSSESSIVES — possessive adjectives, possessive pronouns (mine/yours/his/hers), whose questions
4. ADJECTIVES — describing words, comparative (-er/more), superlative (-est/most), intensifiers (very/really/quite), adjective order
5. ADVERBIALS — adverbs of manner (quickly/slowly), place (here/there/in/on), time (now/soon/already/still/yet), probability (maybe/perhaps/definitely), frequency (always/sometimes/never)
6. NOUNS — naming words, count nouns (one cat, two cats), uncount nouns (water, bread — no "s"!), common mistakes
7. VERBS — present simple, present perfect (have + past participle), passive voice (be + past participle), tense rules
8. CLAUSES and SENTENCES — relative clauses (who/which/that), joining sentences

STUDENT: Malaysian primary kids Year 1–6, learning English, need VERY simple fun explanations.

YOUR PERSONALITY:
- Super kind, bubbly, fun like a cartoon friend
- Use: "Wow!", "Yay!", "Mantap!", "Best lah!", "Jom main!", "Superstar!"
- LOTS of emojis 🎉🌟🦄🐱🎈
- Short sentences, big spaces, EASY words
- NEVER make kids feel bad — always celebrate effort!

STAR SYSTEM (announce every time!):
- Correct: "YAYYY! *ding-ding-ding bell sound* Super correct! 🎉 +3 ⭐"
- Wrong but tried: "Oopsie daisy! *boing boing funny spring sound* Almost! +1 ⭐ anyway! You're still a star! 😊"
- Finish lesson/game: "+10 ⭐ Woohoo! You did it!"

LEVELS: Little Explorer (0-30⭐) → Brave Buddy (31-80⭐) → Super Star (81-150⭐) → Grammar Wizard (151+⭐)

MENU (when kid picks a number):
[1] Explore Fun Grammar Treasures → list topics with fun emojis, ask which to explore
[2] Story Lessons → teach grammar through a SHORT fun story using animals/food/family. VERY simple!
[3] Play and Practise Games → 3-5 fill-blank or choose-right-word games. Primary style! "The dog ___ (run/runs) fast!"
[4] Quick Quiz Adventure → 4 easy questions, give score + stars at end
[5] Write and Draw Time → short fun writing prompt, gently correct their writing, give stars
[6] Ask Me Anything! → answer any grammar question simply and kindly
[7] My Star Collection → show stars, level, streak, badges in cute visual way
[8] Magic Rewards Shop → fun virtual rewards (dragon messages, stickers, jokes)
[9] Super Quick Charts → simple grammar tables (pronoun chart, verb list, etc.)

QUESTION STYLE:
- VERY short: "The cat ___ (jump/jumps) high!"
- Use animals, food, family: cat, dog, mango, mother, school, rain
- Always give 2-3 choices for young kids
- Explain answer kindly using the book rule

RULES:
- ONLY use British Council Grammar Guide content
- If not in book: "Oopsie! That's not in our magic book yet! Let's try something close! 😊"
- Always end with: "Jom terus! What do you want to do next, ${state.name || 'friend'}? Pick a number or tell me! 😄"
- Keep responses SHORT and CHEERFUL — max 200 words
- Use **bold** for grammar words

Current child: ${state.name}
Stars: ${state.stars} ⭐
Level: ${state.level}
Badges: ${state.badges.length ? state.badges.join(', ') : 'None yet!'}`;
}

function startAdventure() {
  const val = document.getElementById('nameField').value.trim();
  if (!val) {
    document.getElementById('nameField').style.borderColor = 'var(--coral)';
    document.getElementById('nameField').placeholder = 'Please tell me your name! 🥺';
    return;
  }
  state.name = val;
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'block';
  document.getElementById('inputArea').style.display = 'block';
  // 🎵 Play sunny welcome jingle!
  setTimeout(playWelcome, 200);
  showWelcome();
}

document.getElementById('nameField').addEventListener('keydown', e => { if (e.key === 'Enter') startAdventure(); });

function showWelcome() {
  const pct = Math.min((state.stars / 31) * 100, 100);
  const html = `
<h3>🎉 Yay yay yay! Welcome, ${state.name}! 🎉</h3>
<p>I'm your <strong>Grammar Adventure Buddy</strong>! 🐼✨<br>
I read our magic grammar book! Inside I found:<br>
🐱 <em>Pronouns</em> &nbsp;🎨 <em>Adjectives</em> &nbsp;🏃 <em>Verbs</em> &nbsp;🏠 <em>Nouns</em> &nbsp;📝 <em>and MORE!</em></p>

<div class="divider"></div>
<p style="font-family:'Baloo 2',cursive;font-size:1.05rem;color:var(--lavender);font-weight:800;margin-bottom:10px;">🗺️ HAPPY ADVENTURE MAP</p>

<div class="menu-grid">
  <button class="mcard" onclick="qt('1')"><span class="ncirc nc1">1</span>🏆 Grammar Treasures</button>
  <button class="mcard" onclick="qt('2')"><span class="ncirc nc2">2</span>📖 Story Lessons</button>
  <button class="mcard" onclick="qt('3')"><span class="ncirc nc3">3</span>🎮 Play &amp; Practise</button>
  <button class="mcard" onclick="qt('4')"><span class="ncirc nc4">4</span>⚡ Quick Quiz</button>
  <button class="mcard" onclick="qt('5')"><span class="ncirc nc5">5</span>✏️ Write &amp; Draw</button>
  <button class="mcard" onclick="qt('6')"><span class="ncirc nc6">6</span>❓ Ask Anything!</button>
  <button class="mcard" onclick="qt('7')"><span class="ncirc nc7">7</span>⭐ My Stars</button>
  <button class="mcard" onclick="qt('8')"><span class="ncirc nc8">8</span>🛍️ Rewards Shop</button>
  <button class="mcard" onclick="qt('9')"><span class="ncirc nc9">9</span>📊 Quick Charts</button>
</div>

<div class="divider"></div>
<div class="prog-box">
  <div class="prog-label"><span>⭐ 0 stars</span><span>🎯 Brave Buddy needs 31 ⭐</span></div>
  <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  <p style="margin-top:8px;font-size:0.82rem;">🌱 Level: <strong>Little Explorer</strong> &nbsp;|&nbsp; ☀️ Streak: <strong>1 day</strong> &nbsp;|&nbsp; 🏅 Badges: <strong>0 earned</strong></p>
</div>

<p style="color:var(--muted);font-size:0.85rem;margin-top:8px;">
  Ready to collect ⭐ and become a <strong>Grammar Wizard</strong>? 🧙✨<br>
  <strong>Jom main!</strong> Tap any button or type a number 1–9! 😄
</p>`;
  addMsg('buddy', html);
}

async function sendMsg() {
  const input = document.getElementById('userMsg');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  // 🔊 Bubble pop on send
  playSend();
  addMsg('user', text);
  state.history.push({ role: 'user', content: text });

  // 🥁 Drum roll if picking Quick Quiz
  if (text.trim() === '4' || text.toLowerCase().includes('quiz')) {
    setTimeout(playQuizStart, 300);
  }
  // 🛍️ Reward shimmer if opening shop
  if (text.trim() === '8' || text.toLowerCase().includes('reward') || text.toLowerCase().includes('shop')) {
    setTimeout(playReward, 300);
  }

  const typId = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystem(),
        messages: state.history
      })
    });

    const data = await res.json();
    removeTyping(typId);

    if (data.content?.[0]) {
      const reply = data.content[0].text;
      state.history.push({ role: 'assistant', content: reply });
      // 🔊 Detect and play correct sound for this reply
      triggerSounds(reply);
      detectStars(reply);
      addMsg('buddy', fmt(reply));
    } else {
      addMsg('buddy', 'Oopsie! Something went wibbly! 😅 Try again, ' + state.name + '!');
    }
  } catch(e) {
    removeTyping(typId);
    addMsg('buddy', '⚠️ Internet seems sleepy! 😴 Check your connection and try again!');
  }

  btn.disabled = false;
  document.getElementById('userMsg').focus();
  scrollBot();
}

function qt(val) {
  document.getElementById('userMsg').value = val;
  sendMsg();
}

document.getElementById('userMsg').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMsg(); });

function detectStars(reply) {
  const lc = reply.toLowerCase();
  let earned = 0;
  if (lc.includes('ding-ding') || lc.includes('super correct') || lc.includes('yayyy') || lc.includes('correct!')) earned = 3;
  else if (lc.includes('oopsie daisy') || lc.includes('boing boing') || lc.includes('almost!') || lc.includes('+1')) earned = 1;
  else if (lc.includes('+10') || lc.includes('wooho') || lc.includes('finished') || lc.includes('completed')) earned = 10;

  if (earned > 0) {
    state.stars += earned;
    updateHeader();
    checkLevel();
    checkBadge(lc);
  }
}

function checkLevel() {
  for (const lv of LEVELS) {
    if (state.stars <= lv.max) {
      if (state.level !== lv.name) {
        state.level = lv.name;
        // 🎵 Play magical level-up fanfare!
        setTimeout(playLevelUp, 100);
        setTimeout(() => {
          addMsg('buddy', `🎺🎊 WOW WOW WOW! <em>*trumpet fanfare and fireworks* 🎆🎆🎆</em><br><br>You levelled up to <strong>${lv.emoji} ${lv.name}</strong>!<br><br>YOU ARE AMAZING, ${state.name}! 🌟🌟🌟<br><br>Jom terus! What do you want to do next, ${state.name}? Pick a number or tell me! 😄`);
        }, 600);
      }
      break;
    }
  }
  updateHeader();
}

function checkBadge(lc) {
  const possible = [
    { key: 'noun', name: '🐶 Noun Ninja' },
    { key: 'verb', name: '⚡ Verb Hero' },
    { key: 'sentence', name: '📝 Sentence Superstar' },
    { key: 'write', name: '✏️ Smiley Writer' },
    { key: 'pronoun', name: '🎭 Pronoun Pro' },
  ];
  possible.forEach(b => {
    if (lc.includes(b.key) && state.stars > 8 && !state.badges.includes(b.name) && Math.random() > 0.72) {
      state.badges.push(b.name);
      // 🧚 Play fairy badge chime!
      setTimeout(playBadge, 150);
      setTimeout(() => {
        addMsg('buddy', `🏅 NEW BADGE UNLOCKED!<br><br><span style="font-size:1.6rem">${b.name}</span><br><br>Amazing work, ${state.name}! You earned the <strong>${b.name}</strong> badge! 🎉<br><br>Jom terus! What do you want to do next, ${state.name}? Pick a number or tell me! 😄`);
      }, 800);
    }
  });
}

function updateHeader() {
  document.getElementById('starsDisplay').textContent = state.stars;
  document.getElementById('levelDisplay').textContent = state.level;
  document.getElementById('streakDisplay').textContent = state.streak;
}

function fmt(text) {
  let h = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
  h = h.replace(/(\+\d+\s*[⭐★])/g, '<span class="star-pop">$1</span>');
  return h;
}

function addMsg(role, content) {
  const wrap = document.getElementById('chatWrap');
  const div = document.createElement('div');
  div.className = `msg ${role === 'buddy' ? 'buddy' : 'user'}`;
  const avContent = role === 'buddy' ? '🐼' : (state.name.charAt(0).toUpperCase() || '😊');
  const avClass = role === 'buddy' ? 'buddy-av' : 'kid-av';
  div.innerHTML = `<div class="av ${avClass}">${avContent}</div><div class="bubble">${content}</div>`;
  wrap.appendChild(div);
  scrollBot();
}

function addTyping() {
  const wrap = document.getElementById('chatWrap');
  const div = document.createElement('div');
  div.className = 'msg buddy'; div.id = 'typing-ind';
  div.innerHTML = `<div class="av buddy-av">🐼</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  scrollBot();
  return 'typing-ind';
}

function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
function scrollBot() { setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 80); }
</script>
